<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060812"/>
      <stop offset="50%" stop-color="#0c0a1e"/>
      <stop offset="100%" stop-color="#060c12"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="170" y1="0" x2="680" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="40%" stop-color="#60a5fa"/>
      <stop offset="75%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pupilFill" cx="40%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="170" rx="10" fill="url(#bg)"/>

  <!-- Dot grid -->
  <g opacity="0.07" fill="#a855f7">
    <circle cx="20"  cy="20"  r="1.2"/><circle cx="40"  cy="20"  r="1.2"/><circle cx="60"  cy="20"  r="1.2"/>
    <circle cx="80"  cy="20"  r="1.2"/><circle cx="100" cy="20"  r="1.2"/><circle cx="120" cy="20"  r="1.2"/>
    <circle cx="140" cy="20"  r="1.2"/><circle cx="160" cy="20"  r="1.2"/>
    <circle cx="20"  cy="40"  r="1.2"/><circle cx="40"  cy="40"  r="1.2"/><circle cx="60"  cy="40"  r="1.2"/>
    <circle cx="80"  cy="40"  r="1.2"/><circle cx="100" cy="40"  r="1.2"/><circle cx="120" cy="40"  r="1.2"/>
    <circle cx="140" cy="40"  r="1.2"/><circle cx="160" cy="40"  r="1.2"/>
    <circle cx="20"  cy="60"  r="1.2"/><circle cx="40"  cy="60"  r="1.2"/><circle cx="60"  cy="60"  r="1.2"/>
    <circle cx="80"  cy="60"  r="1.2"/><circle cx="100" cy="60"  r="1.2"/><circle cx="120" cy="60"  r="1.2"/>
    <circle cx="140" cy="60"  r="1.2"/><circle cx="160" cy="60"  r="1.2"/>
    <circle cx="20"  cy="80"  r="1.2"/><circle cx="40"  cy="80"  r="1.2"/><circle cx="60"  cy="80"  r="1.2"/>
    <circle cx="80"  cy="80"  r="1.2"/><circle cx="100" cy="80"  r="1.2"/><circle cx="120" cy="80"  r="1.2"/>
    <circle cx="140" cy="80"  r="1.2"/><circle cx="160" cy="80"  r="1.2"/>
    <circle cx="20"  cy="100" r="1.2"/><circle cx="40"  cy="100" r="1.2"/><circle cx="60"  cy="100" r="1.2"/>
    <circle cx="80"  cy="100" r="1.2"/><circle cx="100" cy="100" r="1.2"/><circle cx="120" cy="100" r="1.2"/>
    <circle cx="140" cy="100" r="1.2"/><circle cx="160" cy="100" r="1.2"/>
    <circle cx="20"  cy="120" r="1.2"/><circle cx="40"  cy="120" r="1.2"/><circle cx="60"  cy="120" r="1.2"/>
    <circle cx="80"  cy="120" r="1.2"/><circle cx="100" cy="120" r="1.2"/><circle cx="120" cy="120" r="1.2"/>
    <circle cx="140" cy="120" r="1.2"/><circle cx="160" cy="120" r="1.2"/>
    <circle cx="20"  cy="140" r="1.2"/><circle cx="40"  cy="140" r="1.2"/><circle cx="60"  cy="140" r="1.2"/>
    <circle cx="80"  cy="140" r="1.2"/><circle cx="100" cy="140" r="1.2"/><circle cx="120" cy="140" r="1.2"/>
    <circle cx="140" cy="140" r="1.2"/><circle cx="160" cy="140" r="1.2"/>
  </g>

  <!-- Eye glow halo -->
  <circle cx="83" cy="85" r="62" fill="url(#eyeGlow)"/>

  <!-- Eye outer shape -->
  <path d="M 20 85 Q 83 28 146 85 Q 83 142 20 85 Z"
        fill="none" stroke="#a855f7" stroke-width="2.5" opacity="0.9"
        filter="url(#softGlow)"/>

  <!-- Upper/lower lid curves -->
  <path d="M 30 85 Q 83 38 136 85" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.35"/>
  <path d="M 30 85 Q 83 132 136 85" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.35"/>

  <!-- Iris rings -->
  <circle cx="83" cy="85" r="30" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>
  <circle cx="83" cy="85" r="24" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>

  <!-- Pupil -->
  <circle cx="83" cy="85" r="16" fill="url(#pupilFill)" filter="url(#softGlow)"/>

  <!-- Catchlights -->
  <circle cx="77" cy="79" r="5" fill="#fff" opacity="0.55"/>
  <circle cx="90" cy="93" r="2" fill="#fff" opacity="0.25"/>

  <!-- Scan line -->
  <line x1="20" y1="85" x2="146" y2="85"
        stroke="#38bdf8" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Corner tick marks on eye -->
  <line x1="10"  y1="85" x2="20"  y2="85" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="146" y1="85" x2="156" y2="85" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>

  <!-- Vertical divider -->
  <line x1="165" y1="18" x2="165" y2="152" stroke="#a855f7" stroke-width="1" opacity="0.25"/>

  <!-- Main title -->
  <text x="183" y="68"
        font-family="'Courier New', Courier, monospace"
        font-size="42" font-weight="700" letter-spacing="4"
        fill="url(#titleGrad)" filter="url(#glow)">SCAFFOLD-WATCH</text>

  <!-- Subtitle -->
  <text x="186" y="92"
        font-family="'Courier New', Courier, monospace"
        font-size="12" letter-spacing="3" fill="#64748b">OBSERVER  ·  INTERRUPT  ·  ENFORCE</text>

  <!-- Separator line -->
  <rect x="183" y="103" width="570" height="1.5" fill="url(#lineGrad)" opacity="0.9"/>

  <!-- Quote -->
  <text x="186" y="126"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-style="italic" fill="#475569">"Watch. Evaluate. Interrupt only when the cost demands it."</text>

  <!-- Version badge -->
  <rect x="186" y="137" width="62" height="18" rx="3" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <text x="217" y="149" font-family="'Courier New', Courier, monospace"
        font-size="10" text-anchor="middle" fill="#a855f7" opacity="0.8">v 1.0.0</text>

  <!-- Author badge -->
  <rect x="257" y="137" width="78" height="18" rx="3" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  <text x="296" y="149" font-family="'Courier New', Courier, monospace"
        font-size="10" text-anchor="middle" fill="#38bdf8" opacity="0.8">Insider747</text>

  <!-- CLASS-A badge -->
  <rect x="768" y="18" width="115" height="29" rx="5" fill="#0c1f3f" stroke="#4a9eff" stroke-width="1.2"/>
  <text x="825" y="37" font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1" fill="#4a9eff">&#9650; CLASS-A ARCH</text>

  <!-- CLASS-B badge -->
  <rect x="768" y="55" width="115" height="29" rx="5" fill="#3f0c0c" stroke="#ef4444" stroke-width="1.2"/>
  <text x="825" y="74" font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1" fill="#ef4444">&#9632; CLASS-B  SEC</text>

  <!-- CLASS-C badge -->
  <rect x="768" y="92" width="115" height="29" rx="5" fill="#3f2a0c" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="825" y="111" font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1" fill="#f59e0b">&#9670; CLASS-C THRASH</text>

  <!-- CLASS-D badge -->
  <rect x="768" y="129" width="115" height="29" rx="5" fill="#0c3f20" stroke="#22c55e" stroke-width="1.2"/>
  <text x="825" y="148" font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1" fill="#22c55e">&#9679; CLASS-D DRIFT</text>

  <!-- Corner accents -->
  <line x1="5"   y1="18"  x2="18"  y2="18"  stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="5"   y1="18"  x2="5"   y2="32"  stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="895" y1="18"  x2="882" y2="18"  stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
  <line x1="895" y1="18"  x2="895" y2="32"  stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
  <line x1="5"   y1="152" x2="18"  y2="152" stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
  <line x1="5"   y1="152" x2="5"   y2="138" stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
  <line x1="895" y1="152" x2="882" y2="152" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="895" y1="152" x2="895" y2="138" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>

  <!-- Outer border -->
  <rect width="900" height="170" rx="10" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
</svg>
